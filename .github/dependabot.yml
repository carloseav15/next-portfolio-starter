version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    groups:
      next-stack:
        patterns:
          - next
          - "@next/*"
          - eslint-config-next
      test-stack:
        patterns:
          - vitest
          - "@playwright/*"
          - "@testing-library/*"
          - jest-axe
          - jsdom

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/New_York
    open-pull-requests-limit: 5
